<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MigraCare - Seguimiento de Migrañas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; font-size: 16px; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6; color: #1e293b; background: #f8fafc;
      min-height: 100vh; overflow-x: hidden; font-size: 16px;
    }
    .gradient-hero {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh; width: 100%;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.6s ease-out; }
    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }
    .btn-beautiful {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 1rem 1.5rem; font-size: 1rem; font-weight: 600;
      border-radius: 12px; border: none; cursor: pointer; transition: all 0.3s ease;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      text-decoration: none; min-height: 48px; min-width: 48px;
    }
    .btn-beautiful:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
    .btn-secondary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .btn-accent { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .btn-warning { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .stat-beautiful {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
      border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); transition: all 0.3s ease;
      padding: 1.5rem; cursor: pointer;
    }
    .stat-beautiful:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15); }
    .nav-beautiful {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(226, 232, 240, 0.5);
      padding: 1rem 0; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      position: sticky; top: 0; z-index: 40;
    }
    .bottom-nav-beautiful {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);
      border-top: 1px solid rgba(226, 232, 240, 0.5); z-index: 50;
      padding: 0.75rem 0; padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
    }
    .main-content { 
      padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
      min-height: calc(100vh - 80px);
    }
    .episode-card {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
      border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); padding: 1.5rem;
      margin-bottom: 1rem; transition: all 0.3s ease;
    }
    .episode-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15); }
    .modal-beautiful {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      padding: 1rem; overflow-y: auto;
    }
    .modal-content-beautiful {
      max-width: 95vw; width: 100%; max-height: 95vh;
      background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);
      border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      display: flex; flex-direction: column; overflow: hidden; margin: 1rem;
    }
    .input-beautiful {
      width: 100%; padding: 1rem; border-radius: 12px;
      border: 2px solid #e2e8f0; background: rgba(255, 255, 255, 0.9);
      font-size: 1rem; color: #374151; transition: all 0.3s ease;
      outline: none; min-height: 48px;
    }
    .input-beautiful:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    .label-beautiful {
      font-size: 1rem; font-weight: 600; color: #374151;
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;
    }
    .badge {
      display: inline-flex; align-items: center; padding: 0.5rem 1rem;
      border-radius: 20px; font-size: 0.875rem; font-weight: 500;
    }
    .badge-blue { background-color: rgba(59, 130, 246, 0.1); color: rgb(29, 78, 216); }
    .badge-orange { background-color: rgba(251, 146, 60, 0.1); color: rgb(194, 65, 12); }
    .badge-green { background-color: rgba(34, 197, 94, 0.1); color: rgb(21, 128, 61); }
    .badge-red { background-color: rgba(239, 68, 68, 0.1); color: rgb(185, 28, 28); }
    .toast-beautiful {
      position: fixed; top: 1rem; right: 1rem; background: #10b981;
      color: white; padding: 1rem 1.5rem; border-radius: 12px; z-index: 50;
      animation: fadeIn 0.3s ease-out; max-width: calc(100vw - 2rem); font-size: 1rem;
    }
    .calendar-day {
      aspect-ratio: 1; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 0.75rem; position: relative; cursor: pointer; transition: all 0.2s ease;
      min-height: 48px; display: flex; flex-direction: column;
      justify-content: center; align-items: center; font-size: 0.875rem;
    }
    .calendar-day:hover { background: rgba(102, 126, 234, 0.1); }
    .calendar-day.has-episodes { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; }
    .calendar-day.has-episodes:hover { background: rgba(239, 68, 68, 0.2); }
    .chart-bar {
      height: 24px; background: linear-gradient(90deg, #667eea, #4facfe);
      border-radius: 8px; transition: all 0.3s ease;
    }
    .chart-bar:hover { transform: scaleY(1.1); }
    .edit-btn, .delete-btn {
      padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer;
      transition: all 0.2s ease; min-height: 40px; min-width: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .edit-btn { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    .edit-btn:hover { background: rgba(59, 130, 246, 0.2); }
    .delete-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .delete-btn:hover { background: rgba(239, 68, 68, 0.2); }
    .medication-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem; background: rgba(255, 255, 255, 0.8);
      border-radius: 12px; margin-bottom: 0.75rem; border: 1px solid #e2e8f0;
    }
    .medication-input {
      flex: 1; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px;
      font-size: 1rem; outline: none; transition: all 0.3s ease; min-height: 40px;
    }
    .medication-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    
    /* Mobile First - Optimizaciones específicas */
    @media screen and (max-width: 480px) {
      html { font-size: 18px; }
      body { font-size: 18px; }
      .btn-beautiful { 
        padding: 1.25rem 2rem; font-size: 1.125rem; 
        min-height: 56px; border-radius: 16px; 
      }
      .stat-beautiful { 
        padding: 2rem; border-radius: 20px; 
      }
      .episode-card { 
        padding: 2rem; border-radius: 20px; 
      }
      .input-beautiful { 
        padding: 1.25rem; font-size: 1.125rem; 
        min-height: 56px; border-radius: 16px; 
      }
      .label-beautiful { 
        font-size: 1.125rem; margin-bottom: 1rem; 
      }
      .nav-beautiful { padding: 1.5rem 0; }
      .bottom-nav-beautiful { 
        padding: 1rem 0; 
        padding-bottom: calc(1rem + env(safe-area-inset-bottom)); 
      }
      .main-content { 
        padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
      }
    }
    
    @media screen and (min-width: 481px) and (max-width: 768px) {
      html { font-size: 20px; }
      body { font-size: 20px; }
      .btn-beautiful { 
        padding: 1.5rem 2.5rem; font-size: 1.25rem; 
        min-height: 64px; border-radius: 20px; 
      }
      .stat-beautiful { 
        padding: 2.5rem; border-radius: 24px; 
      }
      .episode-card { 
        padding: 2.5rem; border-radius: 24px; 
      }
      .input-beautiful { 
        padding: 1.5rem; font-size: 1.25rem; 
        min-height: 64px; border-radius: 20px; 
      }
      .label-beautiful { 
        font-size: 1.25rem; margin-bottom: 1.25rem; 
      }
      .nav-beautiful { padding: 2rem 0; }
      .bottom-nav-beautiful { 
        padding: 1.25rem 0; 
        padding-bottom: calc(1.25rem + env(safe-area-inset-bottom)); 
      }
      .main-content { 
        padding-bottom: calc(120px + env(safe-area-inset-bottom)); 
      }
    }
    
    @media screen and (min-width: 769px) {
      html { font-size: 22px; }
      body { font-size: 22px; }
      .btn-beautiful { 
        padding: 1.75rem 3rem; font-size: 1.375rem; 
        min-height: 72px; border-radius: 24px; 
      }
      .stat-beautiful { 
        padding: 3rem; border-radius: 28px; 
      }
      .episode-card { 
        padding: 3rem; border-radius: 28px; 
      }
      .input-beautiful { 
        padding: 1.75rem; font-size: 1.375rem; 
        min-height: 72px; border-radius: 24px; 
      }
      .label-beautiful { 
        font-size: 1.375rem; margin-bottom: 1.5rem; 
      }
      .nav-beautiful { padding: 2.5rem 0; }
      .bottom-nav-beautiful { 
        padding: 1.5rem 0; 
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); 
      }
      .main-content { 
        padding-bottom: calc(140px + env(safe-area-inset-bottom)); 
      }
    }
    
    /* Orientación landscape */
    @media screen and (orientation: landscape) and (max-height: 600px) {
      .main-content { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
      .bottom-nav-beautiful { 
        padding: 0.5rem 0; 
        padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); 
      }
      .nav-beautiful { padding: 0.75rem 0; }
      .stat-beautiful { padding: 1rem; }
      .episode-card { padding: 1rem; }
      .modal-content-beautiful { max-height: 90vh; margin: 0.5rem; }
    }
    
    /* Safe area support mejorado */
    @supports (padding: max(0px)) {
      .main-content {
        padding-bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
      }
      .bottom-nav-beautiful {
        padding-bottom: max(0.75rem, calc(0.75rem + env(safe-area-inset-bottom)));
      }
    }
    
    /* Mejoras para pantallas de alta densidad */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      .btn-beautiful, .input-beautiful, .edit-btn, .delete-btn {
        border-width: 2px;
      }
    }
    
    /* Iconos SVG inline */
    .icon {
      width: 1.5em;
      height: 1.5em;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    let entries = [];
    let currentView = 'dashboard';
    let showForm = false;
    let showAdmin = false;
    let editingEpisode = null;
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let appSettings = {
      appName: 'MigraCare',
      appDescription: 'Tu compañero inteligente para el seguimiento de migrañas',
      medications: ['Ibuprofeno', 'Paracetamol', 'Aspirina', 'Sumatriptán', 'Rizatriptán', 'Otro'],
      symptoms: ['Náuseas', 'Vómitos', 'Sensibilidad a la luz', 'Sensibilidad al sonido', 'Aura visual', 'Mareos']
    };

    function loadEntries() {
      try {
        const saved = localStorage.getItem('headache-entries');
        if (saved) entries = JSON.parse(saved);
        const settings = localStorage.getItem('app-settings');
        if (settings) {
          const parsedSettings = JSON.parse(settings);
          appSettings = { ...appSettings, ...parsedSettings };
          if (!appSettings.medications) appSettings.medications = ['Ibuprofeno', 'Paracetamol', 'Aspirina', 'Sumatriptán', 'Rizatriptán', 'Otro'];
          if (!appSettings.symptoms) appSettings.symptoms = ['Náuseas', 'Vómitos', 'Sensibilidad a la luz', 'Sensibilidad al sonido', 'Aura visual', 'Mareos'];
        }
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    function saveEntries() {
      try {
        localStorage.setItem('headache-entries', JSON.stringify(entries));
        localStorage.setItem('app-settings', JSON.stringify(appSettings));
      } catch (error) {
        console.error('Error saving data:', error);
      }
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function formatTime(timeString) {
      const [hours, minutes] = timeString.split(':');
      const date = new Date();
      date.setHours(parseInt(hours), parseInt(minutes));
      return date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }

    function getIntensityColor(intensity) {
      if (intensity <= 3) return '#10b981';
      if (intensity <= 6) return '#f59e0b';
      if (intensity <= 8) return '#ef4444';
      return '#dc2626';
    }

    function getIntensityLabel(intensity) {
      if (intensity <= 3) return 'Leve';
      if (intensity <= 6) return 'Moderado';
      if (intensity <= 8) return 'Severo';
      return 'Extremo';
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast-beautiful ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function showAdvancedForm(episodeToEdit = null) {
      editingEpisode = episodeToEdit;
      showForm = true;
      renderApp();
    }

    function closeForm() {
      showForm = false;
      editingEpisode = null;
      renderApp();
    }

    function showAdminPanel() {
      showAdmin = true;
      renderApp();
    }

    function closeAdmin() {
      showAdmin = false;
      renderApp();
    }

    function setView(view) {
      currentView = view;
      showForm = false;
      showAdmin = false;
      editingEpisode = null;
      renderApp();
    }

    function saveEpisode(episodeData) {
      if (editingEpisode) {
        const index = entries.findIndex(entry => entry.id === editingEpisode.id);
        if (index !== -1) {
          entries[index] = { ...entries[index], ...episodeData };
          showToast('Episodio actualizado correctamente');
        }
      } else {
        const entry = {
          id: Date.now().toString(),
          ...episodeData,
          createdAt: new Date().toISOString()
        };
        entries.push(entry);
        showToast('Episodio registrado correctamente');
      }
      saveEntries();
      closeForm();
    }

    function deleteEpisode(id) {
      if (confirm('¿Estás seguro de que quieres eliminar este episodio?')) {
        entries = entries.filter(entry => entry.id !== id);
        saveEntries();
        showToast('Episodio eliminado');
        renderApp();
      }
    }

    function editEpisode(episode) {
      showAdvancedForm(episode);
    }

    function submitForm() {
      const episodeData = {
        date: document.getElementById('episodeDate')?.value || '',
        time: document.getElementById('episodeTime')?.value || '',
        intensity: parseInt(document.getElementById('episodeIntensity')?.value || 5),
        medications: Array.from(document.querySelectorAll('input[name="medications"]:checked')).map(cb => cb.value),
        symptoms: Array.from(document.querySelectorAll('input[name="symptoms"]:checked')).map(cb => cb.value),
        notes: document.getElementById('episodeNotes')?.value || ''
      };
      
      if (!episodeData.date || !episodeData.time) {
        showToast('Por favor completa fecha y hora', 'error');
        return;
      }
      
      saveEpisode(episodeData);
    }

    function updateIntensity() {
      const slider = document.getElementById('episodeIntensity');
      const valueSpan = document.getElementById('intensityValue');
      const labelSpan = document.getElementById('intensityLabel');
      
      if (slider && valueSpan && labelSpan) {
        const value = parseInt(slider.value);
        valueSpan.textContent = value;
        valueSpan.style.color = getIntensityColor(value);
        labelSpan.textContent = getIntensityLabel(value);
      }
    }

    function setupFormDateTime() {
      setTimeout(() => {
        const now = new Date();
        const dateInput = document.getElementById('episodeDate');
        const timeInput = document.getElementById('episodeTime');
        
        if (editingEpisode) {
          if (dateInput) dateInput.value = editingEpisode.date;
          if (timeInput) timeInput.value = editingEpisode.time;
          if (document.getElementById('episodeIntensity')) {
            document.getElementById('episodeIntensity').value = editingEpisode.intensity;
          }
          if (document.getElementById('episodeNotes')) {
            document.getElementById('episodeNotes').value = editingEpisode.notes || '';
          }
          
          editingEpisode.medications?.forEach(med => {
            const checkbox = document.querySelector(`input[name="medications"][value="${med}"]`);
            if (checkbox) checkbox.checked = true;
          });
          
          editingEpisode.symptoms?.forEach(symptom => {
            const checkbox = document.querySelector(`input[name="symptoms"][value="${symptom}"]`);
            if (checkbox) checkbox.checked = true;
          });
        } else {
          if (dateInput && !dateInput.value) {
            dateInput.value = now.toISOString().split('T')[0];
          }
          if (timeInput && !timeInput.value) {
            timeInput.value = now.toTimeString().slice(0, 5);
          }
        }
        
        updateIntensity();
      }, 100);
    }

    function addMedication() {
      if (appSettings.medications.length >= 12) {
        showToast('Máximo 12 medicamentos permitidos', 'error');
        return;
      }
      appSettings.medications.push('Nuevo medicamento');
      saveEntries();
      renderApp();
    }

    function removeMedication(index) {
      if (appSettings.medications.length <= 3) {
        showToast('Mínimo 3 medicamentos requeridos', 'error');
        return;
      }
      appSettings.medications.splice(index, 1);
      saveEntries();
      renderApp();
    }

    function updateMedication(index, value) {
      appSettings.medications[index] = value;
      saveEntries();
    }

    function addSymptom() {
      if (appSettings.symptoms.length >= 12) {
        showToast('Máximo 12 síntomas permitidos', 'error');
        return;
      }
      appSettings.symptoms.push('Nuevo síntoma');
      saveEntries();
      renderApp();
    }

    function removeSymptom(index) {
      if (appSettings.symptoms.length <= 3) {
        showToast('Mínimo 3 síntomas requeridos', 'error');
        return;
      }
      appSettings.symptoms.splice(index, 1);
      saveEntries();
      renderApp();
    }

    function updateSymptom(index, value) {
      appSettings.symptoms[index] = value;
      saveEntries();
    }
